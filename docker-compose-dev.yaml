version: "3.9"
services:
  db_test:
    container_name: "db_test"
    image: postgres
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    ports:
      - "5433:5433"
    networks:
      - custom

  redis:
    container_name: "redis"
    image: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - custom

networks:
  custom:
    driver: bridge