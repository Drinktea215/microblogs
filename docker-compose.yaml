version: "3.0"
services:
  db:
    container_name: "db"
    image: postgres
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    ports:
      - "5432:5432"
    networks:
      - custom

#  db_test:
#    container_name: "db_test"
#    image: postgres
#    restart: always
#    environment:
#      - POSTGRES_USER=admin
#      - POSTGRES_PASSWORD=admin
#    ports:
#      - "5433:5432"
#    networks:
#      - custom

  redis:
    container_name: "redis"
    image: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - custom

  app:
    container_name: "app"
    image: app
    build:
      context: .
    command: bash -c "./run.sh && cd src && gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --bind=0.0.0.0:8000"
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    networks:
      - custom

  nginx:
    image: nginx
    ports:
      - "8080:80"
    restart: always
    volumes:
      - ./static:/usr/share/nginx/html/static
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - custom

networks:
  custom:
    driver: bridge